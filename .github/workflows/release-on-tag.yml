name: Release on Tag

on:
  push:
    tags:
      - "v*" # keep in sync with TAG_PREFIX in release-naming.env
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to rebuild (e.g. v1.2.3). Use the 'Release' workflow to create a new version."
        required: true
        type: string

permissions:
  contents: write
  packages: write
  attestations: write
  id-token: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate naming contract
        run: |
          test -f release-naming.env
          source release-naming.env
          test -n "$IMAGE_NAME"
          test -n "$TAG_PREFIX"
          test -n "$REGISTRY"
          echo "IMAGE_NAME=$IMAGE_NAME" >> "$GITHUB_ENV"
          echo "REGISTRY=$REGISTRY" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
            type=semver,pattern={{version}},value=${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
            type=semver,pattern={{major}},value=${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Generate CHANGELOG.md
        run: |
          source release-naming.env
          current_tag="${RELEASE_TAG}"
          previous_tag=$(git tag -l "${TAG_PREFIX}*" --sort=-version:refname | grep -v "^${current_tag}$" | head -n 1 || true)

          {
            echo "# Changelog"
            echo
            echo "## ${current_tag}"
            echo
            if [ -n "${previous_tag}" ]; then
              echo "Changes since ${previous_tag}:"
              echo
              git log --pretty='- %s (%h)' "${previous_tag}..${current_tag}"
            else
              echo "Initial release changes:"
              echo
              git log --pretty='- %s (%h)' "${current_tag}"
            fi
          } > CHANGELOG.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          body_path: CHANGELOG.md
          prerelease: ${{ contains(env.RELEASE_TAG, '-alpha.') || contains(env.RELEASE_TAG, '-beta.') || contains(env.RELEASE_TAG, '-rc.') }}
